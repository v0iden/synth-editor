<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Micro:bit Synth Presets</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f5f7;--surface:#ffffff;--surface2:#f0f0f2;--surface3:#e8e8ec;
  --border:#d4d4d8;--text:#1c1c1e;--dim:#6e6e73;
  --osc:#0071e3;--flt:#e8590c;--env:#2f9e44;--lfo:#7048e8;--out:#0891b2;--fm:#e64980;
  --radius:6px;
}
body{font-family:'Inter','SF Pro Display',-apple-system,system-ui,sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;display:flex;flex-direction:column}

header{display:flex;align-items:center;gap:12px;padding:8px 16px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
header h1{font-size:13px;font-weight:700;letter-spacing:2px;color:var(--osc);text-transform:uppercase;white-space:nowrap}
.header-right{display:flex;align-items:center;gap:8px;margin-left:auto}

.btn{
  padding:5px 12px;border-radius:var(--radius);border:1px solid var(--border);
  background:var(--surface2);color:var(--text);font-family:inherit;font-size:11px;
  cursor:pointer;display:inline-flex;align-items:center;gap:5px;transition:all .15s;
  white-space:nowrap;font-weight:500;
}
.btn:hover{border-color:var(--osc);color:var(--osc)}
.btn:active{transform:scale(0.97)}
.btn.copy-btn{background:var(--env);border-color:var(--env);color:#fff;font-weight:600}
.btn.copy-btn:hover{background:#37b24d}
.btn svg{width:12px;height:12px;flex-shrink:0}

.app-layout{display:flex;flex:1;min-height:0}

.sidebar{
  width:200px;min-width:200px;background:var(--surface);border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;flex-shrink:0;
}
.sidebar-head{
  font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;
  color:var(--dim);padding:8px 10px 4px;flex-shrink:0;
}
.sidebar-list{flex:1;overflow-y:auto;padding:0 6px 8px}
.preset-item{
  display:flex;align-items:center;gap:4px;padding:4px 6px;border-radius:5px;
  cursor:pointer;transition:all .1s;border:1px solid transparent;margin-bottom:1px;
}
.preset-item:hover{background:var(--surface2);border-color:var(--border)}
.preset-item.active{background:var(--osc);border-color:var(--osc);color:#fff}
.preset-item.active .preset-name{color:#fff}
.preset-item.active .preset-num{color:rgba(255,255,255,.6)}
.preset-num{font-size:9px;color:var(--dim);min-width:14px;text-align:right}
.preset-name{font-size:11px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

.main-scroll{flex:1;overflow-y:auto;padding:10px 14px 24px}

.panel{
  background:var(--surface);border:1px solid var(--border);border-radius:8px;
  margin-bottom:8px;overflow:hidden;
}
.panel-head{
  font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;
  padding:6px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px;
}
.panel-head .dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.panel-body{padding:6px 12px;display:flex;flex-direction:column;gap:3px}

.row2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
@media(max-width:750px){.row2,.row3{grid-template-columns:1fr}}

.osc-grid{display:grid;grid-template-columns:1fr 1fr;gap:3px 16px}
.osc-grid .osc-col{display:flex;flex-direction:column;gap:3px}
.osc-grid .param-label{width:38px;min-width:38px}
.osc-extra{display:flex;flex-direction:column;gap:3px;margin-top:2px;padding-top:4px;border-top:1px solid var(--border)}

.param{display:flex;align-items:center;gap:6px;height:24px}
.param-label{font-size:10px;color:var(--dim);width:78px;min-width:78px;white-space:nowrap}
.param-slider{
  flex:1;-webkit-appearance:none;appearance:none;height:3px;
  background:var(--border);border-radius:2px;outline:none;min-width:40px;
}
.param-slider::-webkit-slider-thumb{
  -webkit-appearance:none;width:12px;height:12px;border-radius:50%;cursor:pointer;
  border:2px solid #fff;transition:transform .1s;box-shadow:0 1px 3px rgba(0,0,0,.2);
}
.param-slider::-webkit-slider-thumb:hover{transform:scale(1.2)}
.osc-s::-webkit-slider-thumb{background:var(--osc)}
.flt-s::-webkit-slider-thumb{background:var(--flt)}
.env-s::-webkit-slider-thumb{background:var(--env)}
.lfo-s::-webkit-slider-thumb{background:var(--lfo)}
.out-s::-webkit-slider-thumb{background:var(--out)}
.fm-s::-webkit-slider-thumb{background:var(--fm)}

.param-val{
  width:54px;text-align:right;font-size:10px;font-family:'SF Mono','Fira Code',monospace;
  color:var(--text);background:var(--bg);border:1px solid var(--border);
  border-radius:3px;padding:2px 4px;outline:none;
}
.param-val:focus{border-color:var(--osc)}

select.param-dd{
  background:var(--surface2);border:1px solid var(--border);color:var(--text);
  padding:3px 6px;border-radius:4px;font-family:inherit;font-size:10px;cursor:pointer;outline:none;
}

.toggle{
  position:relative;width:32px;height:18px;background:var(--border);border-radius:9px;
  cursor:pointer;transition:background .2s;flex-shrink:0;
}
.toggle.on{background:var(--env)}
.toggle::after{
  content:'';position:absolute;width:12px;height:12px;background:#fff;
  border-radius:50%;top:3px;left:3px;transition:transform .2s;box-shadow:0 1px 2px rgba(0,0,0,.15);
}
.toggle.on::after{transform:translateX(14px)}

.scope-wrap{
  background:var(--surface);border:1px solid var(--border);border-radius:8px;
  overflow:hidden;margin-bottom:8px;
}
.scope-head{
  font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;
  padding:6px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px;
}
canvas#scope{width:100%;height:80px;display:block;background:#fafafa}

.keyboard-wrap{margin-bottom:8px;overflow-x:auto;padding-bottom:2px}
.keyboard{
  display:flex;position:relative;height:56px;min-width:500px;user-select:none;
  touch-action:none;
}
.key-w{
  width:28px;height:56px;background:linear-gradient(180deg,#fff,#f0f0f2);
  border:1px solid #c4c4c8;border-radius:0 0 4px 4px;cursor:pointer;position:absolute;z-index:1;
  display:flex;align-items:flex-end;justify-content:center;padding-bottom:3px;
  font-size:7px;color:#aaa;transition:background .06s;flex-shrink:0;
}
.key-w:hover{background:linear-gradient(180deg,#e8f0ff,#dce4f0)}
.key-w.active{background:linear-gradient(180deg,var(--osc),#005bb5);color:#fff;border-color:var(--osc)}
.key-b{
  width:18px;height:34px;background:linear-gradient(180deg,#3a3a3c,#1c1c1e);
  border:1px solid #000;border-radius:0 0 3px 3px;cursor:pointer;position:absolute;z-index:2;
  transition:background .06s;
}
.key-b:hover{background:linear-gradient(180deg,#555,#3a3a3c)}
.key-b.active{background:linear-gradient(180deg,var(--lfo),#5030b0)}

.output-box{
  background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px 12px;
  display:flex;align-items:center;gap:8px;
}
.output-str{
  flex:1;font-family:'SF Mono','Fira Code',monospace;font-size:10px;line-height:1.5;
  color:#1c7c3c;word-break:break-all;
}

.toast{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(60px);
  background:var(--text);color:#fff;padding:8px 20px;border-radius:6px;
  font-size:12px;font-weight:600;pointer-events:none;opacity:0;transition:all .3s;z-index:100;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<header>
  <h1>Micro:bit Synth</h1>
  <div class="header-right">
    <button class="btn copy-btn" onclick="copyPreset()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
      Kopier
    </button>
  </div>
</header>

<div class="app-layout">
  <nav class="sidebar">
    <div class="sidebar-head">Presets</div>
    <div class="sidebar-list" id="presetList"></div>
  </nav>

  <main class="main-scroll">
    <div class="scope-wrap">
      <div class="scope-head"><span class="dot" style="background:var(--osc)"></span>Waveform</div>
      <canvas id="scope"></canvas>
    </div>

    <div class="panel" id="pnlOsc">
      <div class="panel-head"><span class="dot" style="background:var(--osc)"></span>Oscillators</div>
      <div class="panel-body" id="oscBody"></div>
    </div>

    <div class="row2">
      <div class="panel" id="pnlFlt">
        <div class="panel-head"><span class="dot" style="background:var(--flt)"></span>Filter</div>
        <div class="panel-body" id="fltBody"></div>
      </div>
      <div class="panel" id="pnlEnv">
        <div class="panel-head"><span class="dot" style="background:var(--env)"></span>Envelope</div>
        <div class="panel-body" id="envBody"></div>
      </div>
    </div>

    <div class="row3">
      <div class="panel" id="pnlLfo">
        <div class="panel-head"><span class="dot" style="background:var(--lfo)"></span>LFO &amp; Vibrato</div>
        <div class="panel-body" id="lfoBody"></div>
      </div>
      <div class="panel" id="pnlFm">
        <div class="panel-head"><span class="dot" style="background:var(--fm)"></span>FM</div>
        <div class="panel-body" id="fmBody"></div>
      </div>
      <div class="panel" id="pnlOut">
        <div class="panel-head"><span class="dot" style="background:var(--out)"></span>Output</div>
        <div class="panel-body" id="outBody"></div>
      </div>
    </div>

    <div class="keyboard-wrap"><div class="keyboard" id="keyboard"></div></div>

    <div class="output-box">
      <span class="output-str" id="outputStr"></span>
      <button class="btn copy-btn" onclick="copyPreset()">Kopier</button>
    </div>
  </main>
</div>

<div class="toast" id="toast"></div>

<script>
const SR = 44100;
const BLOCK = 256;
const PI = Math.PI;

const notetab = new Float32Array(129);
for (let i = 0; i < 128; i++) notetab[i] = Math.pow(2, (i - 69) / 12);
notetab[128] = notetab[127];

function interpNote(ind) {
  const i = Math.min(Math.max(Math.floor(ind), 0), 127);
  const frac = ind - i;
  return (1 - frac) * notetab[i] + frac * notetab[i + 1];
}

class Osc {
  constructor() { this.acc = 0; this.delta = 0; this.pw = 0; this.wave = 0; }
  process() {
    const out = this.acc;
    this.acc += this.delta;
    if (this.acc > 1) this.acc -= 2;
    switch (this.wave) {
      case 0: return out;
      case 1: return (out > this.pw ? 1 : -1) + this.pw;
      case 2: default: return Math.abs(out) * 2 - 1;
    }
  }
  processPM(pm) {
    const out = this.acc;
    this.acc += this.delta + pm;
    if (this.acc > 1) this.acc -= 2;
    else if (this.acc < -1) this.acc += 2;
    switch (this.wave) {
      case 0: return out;
      case 1: return (out > this.pw ? 1 : -1) + this.pw;
      case 2: default: return Math.abs(out) * 2 - 1;
    }
  }
  setFreq(f) { this.delta = 2 * f / SR; }
  setType(t) { this.wave = t; }
  setPW(pw) { this.pw = pw; }
}

class SVF {
  constructor() { this.g = 0; this.g1 = 0; this.d = 0; this.s1 = 0; this.s2 = 0; }
  _tan(x) {
    const pi2 = PI * PI, pi3 = pi2 * PI, pi5 = pi3 * pi2;
    const a = 3.260e-01 * pi3, b = 1.823e-01 * pi5, f2 = x * x;
    return x * (PI + f2 * (a + b * f2));
  }
  set(cutoff, res) {
    const r = 1 - res;
    this.g = this._tan(cutoff);
    this.g1 = 2 * r + this.g;
    this.d = 1 / (1 + 2 * r * this.g + this.g * this.g);
  }
  process(x, ftype) {
    const hp = (x - this.g1 * this.s1 - this.s2) * this.d;
    const v1 = this.g * hp;
    const bp = v1 + this.s1;
    this.s1 = bp + v1;
    const v2 = this.g * bp;
    const lp = v2 + this.s2;
    this.s2 = lp + v2;
    switch (ftype) { case 0: default: return lp; case 2: return bp; case 1: return hp; }
  }
  reset() { this.s1 = 0; this.s2 = 0; }
}

class ADSR {
  constructor() { this.reset(); this.inc = [0, 0, 0, 0]; this.levels = [0, 1, 0.5, 0, 0]; }
  reset() { this.phase = 0; this.phaseInc = 0; this.cur = 0; this.state = 4; this.startVal = 0; }
  process() {
    if (this.state === 4) return 0;
    if (this.phase >= 1) {
      this.phase = 0;
      const next = this.state + 1;
      this.state = next;
      this.startVal = this.levels[next];
      this.phaseInc = this.inc[this.state] || 0;
    }
    this.phase += this.phaseInc;
    this.cur = this.startVal + (this.levels[this.state + 1] - this.startVal) * this.phase;
    return this.cur;
  }
  gate(g) {
    this.startVal = this.cur; this.phase = 0;
    this.state = g ? 0 : 3; this.phaseInc = this.inc[this.state] || 0;
  }
  done() { return this.state === 4; }
  value() { return this.cur; }
  set(a, d, s, r) {
    const rSR = 1 / SR;
    this.inc[0] = Math.min(rSR / a, 1);
    this.inc[1] = Math.min(rSR / d, 1);
    this.inc[2] = 0;
    this.levels[2] = s;
    this.inc[3] = Math.min(rSR / r, 1);
  }
}

function renderNote(preset, midiNote, durationSec, maxSec) {
  const osc = [new Osc(), new Osc()];
  const lfo = new Osc(), vibLfo = new Osc(), filter = new SVF(), env = new ADSR();
  const p = preset;
  const gateLen = Math.round(durationSec * SR), maxLen = Math.round(maxSec * SR);
  const buf = new Float32Array(maxLen);
  filter.reset();
  osc[0].setPW(p.osc1Pw); osc[1].setPW(p.osc2Pw);
  osc[0].setType(p.osc1Shape); osc[1].setType(p.osc2Shape);
  lfo.setType(p.lfoShape); lfo.setFreq(p.lfoFreq * BLOCK);
  env.set(p.envA, p.envD, p.envS, p.envR);
  filter.set(p.vcfCutoff, p.vcfReso);
  vibLfo.setType(2);
  const gain = p.gain;
  let smoothedGate = 0, stopping = false, noiseState = 12345;
  env.reset(); env.gate(true);
  let rendered = 0, noteOff = false;
  while (rendered < maxLen) {
    const bl = Math.min(BLOCK, maxLen - rendered);
    const lv = lfo.process();
    vibLfo.setFreq(p.vibFreq * BLOCK);
    const vib = vibLfo.process() * p.vibAmount;
    const lfoFlt = p.vcfLfo * lv * 40, envFlt = p.vcfEnv * env.value() * 80;
    const keyFlt = p.vcfKeyFollow * (midiNote + p.tune - 60);
    filter.set((700 / SR) * interpNote(p.vcfCutoff * 87 + 40 + lfoFlt + envFlt + keyFlt), p.vcfReso);
    const nf = 440 * interpNote(midiNote + p.tune + vib);
    osc[0].setFreq(nf); osc[1].setFreq(nf * interpNote(p.osc2Transpose + 69));
    osc[0].setPW(p.osc1Pw + p.osc1Pwm * lv); osc[1].setPW(p.osc2Pw + p.osc2Pwm * lv);
    for (let i = 0; i < bl; i++) {
      const ev = env.process(), o1 = osc[0].process();
      const gate = stopping ? 0 : 1;
      smoothedGate += (gate - smoothedGate) * 0.005;
      const ae = p.ampGate ? smoothedGate : ev;
      const os = o1 * p.osc1Vol + osc[1].processPM(p.fmAmount * o1) * p.osc2Vol;
      noiseState = (Math.imul(1664525, noiseState) + 1013904223) | 0;
      buf[rendered + i] = Math.max(-1, Math.min(1, gain * ae * filter.process(os + p.noise * noiseState / 2147483647, p.vcfType)));
    }
    rendered += bl;
    if (!noteOff && rendered >= gateLen) { env.gate(false); stopping = true; noteOff = true; }
    if (noteOff) { if (p.ampGate ? smoothedGate < 1e-3 : env.done()) break; }
  }
  return buf.subarray(0, rendered);
}

// ── Preset parsing ──
const STRING_FIELDS = [
  'osc1Shape','osc2Shape','osc2Transpose','osc1Vol','osc2Vol',
  'osc1Pw','osc2Pw','osc1Pwm','osc2Pwm','fmAmount',
  'vcfType','vcfCutoff','vcfReso','vcfEnv','vcfLfo','vcfKeyFollow',
  'envA','envD','envS','envR',
  'lfoShape','lfoFreq','vibFreq','vibAmount',
  'gain','tune','noise','ampGate'
];
const OSC_NAMES = ['Saw','Pulse','Triangle'];
const FLT_NAMES = ['LPF','HPF','BPF'];

function parsePresetString(str) {
  const tokens = str.replace(/^\{\s*/, '').replace(/\s*\}$/, '').split(',').map(t => t.trim());
  const p = {};
  for (let i = 0; i < STRING_FIELDS.length && i < tokens.length; i++) {
    const f = STRING_FIELDS[i], t = tokens[i];
    if (f === 'osc1Shape' || f === 'osc2Shape' || f === 'lfoShape')
      p[f] = t.includes('Saw') ? 0 : t.includes('Pulse') ? 1 : t.includes('Triangle') ? 2 : parseInt(t);
    else if (f === 'vcfType')
      p[f] = t.includes('LPF') ? 0 : t.includes('HPF') ? 1 : t.includes('BPF') ? 2 : parseInt(t);
    else if (f === 'ampGate') p[f] = t.includes('true') || t === '1';
    else p[f] = parseFloat(t);
  }
  return p;
}
function buildPresetString(p) {
  return '{ ' + STRING_FIELDS.map(f => {
    if (f === 'osc1Shape' || f === 'osc2Shape' || f === 'lfoShape') return 'OscType::' + OSC_NAMES[p[f]];
    if (f === 'vcfType') return 'FilterType::' + FLT_NAMES[p[f]];
    if (f === 'ampGate') return p[f] ? 'true' : 'false';
    return (typeof p[f] === 'number') ? p[f].toFixed(6) : '0.000000';
  }).join(', ') + ' }';
}
function parseAllPresets(text) {
  const presets = [], lines = text.split('\n');
  let name = null;
  for (const line of lines) {
    const t = line.trim();
    if (!t) continue;
    if (t.startsWith('{')) { if (name) { const p = parsePresetString(t); if (p.osc1Shape !== undefined) presets.push({ name, params: p }); name = null; } }
    else if (!t.startsWith('Lyder') && !t.startsWith('husk')) name = t.replace(/:$/, '');
  }
  return presets;
}

const PRESETS_RAW = `NY FMpluck:
{ OscType::Triangle, OscType::Pulse, 12.000000, 1.000000, 1.000000, 0.000000, 0.000000, 0.210859, 0.000000, 0.093578, FilterType::LPF, 0.000000, 0.548227, 0.897500, 0.000000, 0.395250, 0.000000, 0.320156, 0.000000, 1.040781, OscType::Triangle, 16.641563, 8.931875, 0.125250, 0.500000, 0.000000, 0.343422, false }
NY PWM DOOM
{ OscType::Pulse, OscType::Pulse, -12.000000, 1.000000, 1.000000, 0.000000, 0.000000, 0.131672, 0.216203, 0.000000, FilterType::LPF, 0.000000, 0.548227, 0.881281, 0.000000, 0.395250, 0.000000, 0.637187, 0.297000, 1.040781, OscType::Triangle, 3.550313, 8.931875, 0.000000, 0.500000, 0.000000, 0.320547, false }
Wobbly saw
{ OscType::Pulse, OscType::Pulse, 0.000000, 0.500000, 0.500000, -0.304000, -0.544000, 0.300000, 0.300000, 0.168000, FilterType::LPF, 0.280000, 0.131376, 0.608000, 0.392000, 0.000000, 0.800000, 0.000000, 0.500000, 1.000000, OscType::Triangle, 10.420000, 5.000000, 0.000000, 0.500000, 0.000000, 0.296000, false }
Fatter wobbly saw:
{ OscType::Pulse, OscType::Pulse, 0.192000, 0.500000, 0.552000, 0.000000, 0.000000, 0.300000, 0.300000, 0.000000, FilterType::LPF, 0.400000, 0.000000, 0.300000, 0.100000, 0.000000, 0.000000, 0.500000, 0.500000, 1.000000, OscType::Triangle, 3.220000, 13.560000, 0.184000, 0.500000, 0.000000, 0.000000, false }
Triangle pluck
{ OscType::Triangle, OscType::Triangle, 12.000000, 1.000000, 1.000000, 0.000000, 0.000000, 0.300000, 0.300000, 0.008000, FilterType::LPF, 0.208000, 0.000000, 0.596000, 0.000000, 1.000000, 0.000000, 0.100000, 0.192000, 1.020000, OscType::Triangle, 3.220000, 2.920000, 0.040000, 0.624000, 0.000000, 0.000000, false }
Saw filter lfo
{ OscType::Saw, OscType::Saw, 12.000000, 1.000000, 0.000000, 0.000000, 0.000000, 0.300000, 0.300000, 0.000000, FilterType::LPF, 0.000000, 0.440496, 0.912000, 0.716000, 1.000000, 0.000000, 0.400000, 0.360000, 1.020000, OscType::Triangle, 6.340000, 10.360000, 0.184000, 0.624000, 0.000000, 0.212000, false }
Noisy Saw

const presets = parseAllPresets(PRESETS_RAW);
let activeIdx = 0, playingSource = null, audioCtx = null;

// ── UI ──

function bph(group) {
  return group.map(p => {
    const id = 'p_' + p.field;
    if (p.type === 'osc') return `<div class="param"><span class="param-label">${p.label}</span><select class="param-dd" id="${id}" onchange="setP('${p.field}',+this.value)"><option value="0">Saw</option><option value="1">Pulse</option><option value="2">Triangle</option></select></div>`;
    if (p.type === 'flt') return `<div class="param"><span class="param-label">${p.label}</span><select class="param-dd" id="${id}" onchange="setP('${p.field}',+this.value)"><option value="0">LPF</option><option value="1">HPF</option><option value="2">BPF</option></select></div>`;
    if (p.type === 'bool') return `<div class="param"><span class="param-label">${p.label}</span><div class="toggle" id="${id}" onclick="toggleP('${p.field}',this)"></div></div>`;
    return `<div class="param"><span class="param-label">${p.label}</span><input type="range" class="param-slider ${p.cls}" id="${id}" min="${p.min}" max="${p.max}" step="${p.step}" oninput="slideP('${p.field}',this.value)"><input type="text" class="param-val" id="${id}_v" onchange="textP('${p.field}',this.value)" onkeydown="if(event.key==='Enter')this.blur()"></div>`;
  }).join('');
}

function initUI() {
  document.getElementById('oscBody').innerHTML =
    `<div class="osc-grid"><div class="osc-col"><div style="font-size:9px;font-weight:600;letter-spacing:1px;color:var(--osc);margin-bottom:1px">OSC 1</div>${bph(PARAMS.osc1)}</div><div class="osc-col"><div style="font-size:9px;font-weight:600;letter-spacing:1px;color:var(--osc);margin-bottom:1px">OSC 2</div>${bph(PARAMS.osc2)}</div></div><div class="osc-extra">${bph(PARAMS.oscX)}</div>`;
  document.getElementById('fltBody').innerHTML = bph(PARAMS.flt);
  document.getElementById('envBody').innerHTML = bph(PARAMS.env);
  document.getElementById('lfoBody').innerHTML = bph(PARAMS.lfo);
  document.getElementById('fmBody').innerHTML = bph(PARAMS.fm);
  document.getElementById('outBody').innerHTML = bph(PARAMS.out);

  const list = document.getElementById('presetList');
  presets.forEach((p, i) => {
    const item = document.createElement('div');
    item.className = 'preset-item';
    item.id = 'pi_' + i;
    item.innerHTML = `<span class="preset-num">${i + 1}</span><span class="preset-name">${p.name}</span>`;
    item.onclick = () => selectPreset(i);
    list.appendChild(item);
  });
  buildKeyboard();
}

function refreshUI() {
  const p = presets[activeIdx].params;
  const all = [PARAMS.osc1, PARAMS.osc2, PARAMS.oscX, PARAMS.flt, PARAMS.env, PARAMS.lfo, PARAMS.fm, PARAMS.out];
  for (const g of all) for (const d of g) {
    const el = document.getElementById('p_' + d.field);
    if (!el) continue;
    if (d.type === 'osc' || d.type === 'flt') el.value = p[d.field];
    else if (d.type === 'bool') el.classList.toggle('on', !!p[d.field]);
    else { el.value = p[d.field]; const v = document.getElementById('p_' + d.field + '_v'); if (v) v.value = typeof p[d.field] === 'number' ? p[d.field].toFixed(3) : p[d.field]; }
  }
  refreshOutput();
}

function setP(f, v) { presets[activeIdx].params[f] = v; refreshOutput(); }
function slideP(f, v) { const n = parseFloat(v); presets[activeIdx].params[f] = n; const e = document.getElementById('p_' + f + '_v'); if (e) e.value = n.toFixed(3); refreshOutput(); }
function textP(f, v) { const n = parseFloat(v); if (isNaN(n)) return; presets[activeIdx].params[f] = n; const s = document.getElementById('p_' + f); if (s && s.type === 'range') s.value = n; refreshOutput(); }
function toggleP(f, el) { const n = !presets[activeIdx].params[f]; presets[activeIdx].params[f] = n; el.classList.toggle('on', n); refreshOutput(); }

let scopeTimer = null;
function refreshOutput() {
  document.getElementById('outputStr').textContent = buildPresetString(presets[activeIdx].params);
  if (scopeTimer) cancelAnimationFrame(scopeTimer);
  scopeTimer = requestAnimationFrame(renderPreview);
}
function renderPreview() {
  const p = presets[activeIdx].params;
  const dur = p.ampGate ? 0.8 : 0.5;
  drawScope(renderNote(p, 60, dur, dur + Math.max(p.envR || 0, 2) + 1));
}

function selectPreset(idx) {
  activeIdx = idx;
  document.querySelectorAll('.preset-item').forEach((el, i) => el.classList.toggle('active', i === idx));
  refreshUI();
  playNote(60);
}

function copyPreset() {
  navigator.clipboard.writeText(buildPresetString(presets[activeIdx].params)).then(() => showToast('Kopiert!'));
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1400);
}

// ── Keyboard ──
const NOTE_NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const KB_START = 48; // C3
const KB_OCTAVES = 3;
let kbDragging = false;

function buildKeyboard() {
  const kb = document.getElementById('keyboard');
  kb.innerHTML = '';
  const whites = [], blacks = [];
  for (let o = 0; o < KB_OCTAVES; o++) for (let n = 0; n < 12; n++) {
    const midi = KB_START + o * 12 + n;
    ([1,3,6,8,10].includes(n) ? blacks : whites).push({ midi, n, oct: o });
  }
  whites.push({ midi: KB_START + KB_OCTAVES * 12, n: 0, oct: KB_OCTAVES });
  const ww = 28;
  kb.style.width = (whites.length * ww) + 'px';

  function activate(midi, el) { playNote(midi); document.querySelectorAll('.key-w.active,.key-b.active').forEach(k => k.classList.remove('active')); el.classList.add('active'); }

  whites.forEach((w, i) => {
    const k = document.createElement('div');
    k.className = 'key-w'; k.style.left = (i * ww) + 'px';
    k.dataset.midi = w.midi;
    if (w.n === 0) k.textContent = 'C' + (3 + w.oct);
    k.onpointerdown = e => { e.preventDefault(); kbDragging = true; activate(w.midi, k); };
    k.onpointerenter = e => { if (kbDragging) activate(w.midi, k); };
    kb.appendChild(k);
  });

  const bOff = { 1: 0.65, 3: 1.65, 6: 3.65, 8: 4.65, 10: 5.65 };
  blacks.forEach(b => {
    const k = document.createElement('div');
    k.className = 'key-b'; k.style.left = ((b.oct * 7 + bOff[b.n]) * ww) + 'px';
    k.dataset.midi = b.midi;
    k.onpointerdown = e => { e.preventDefault(); kbDragging = true; activate(b.midi, k); };
    k.onpointerenter = e => { if (kbDragging) activate(b.midi, k); };
    kb.appendChild(k);
  });

  document.addEventListener('pointerup', () => { kbDragging = false; });
}

// ── Audio ──
function getAudioCtx() { if (!audioCtx) audioCtx = new AudioContext({ sampleRate: SR }); return audioCtx; }

function playNote(midi) {
  stopPlayback();
  const ctx = getAudioCtx();
  if (ctx.state === 'suspended') ctx.resume();
  const p = presets[activeIdx].params;
  const dur = p.ampGate ? 0.8 : 0.5;
  const samples = renderNote(p, midi, dur, dur + Math.max(p.envR || 0, 2) + 1);
  drawScope(samples);
  const ab = ctx.createBuffer(1, samples.length, SR);
  ab.copyToChannel(samples, 0);
  const src = ctx.createBufferSource();
  src.buffer = ab; src.connect(ctx.destination); src.start();
  playingSource = src;
  src.onended = () => { if (playingSource === src) playingSource = null; };
}
function stopPlayback() { if (playingSource) { try { playingSource.stop(); } catch(e){} playingSource = null; } }

function drawScope(samples) {
  const canvas = document.getElementById('scope');
  const dpr = window.devicePixelRatio || 1;
  const w = canvas.clientWidth, h = canvas.clientHeight;
  canvas.width = w * dpr; canvas.height = h * dpr;
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  ctx.fillStyle = '#fafafa'; ctx.fillRect(0, 0, w, h);
  ctx.strokeStyle = '#e4e4e8'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(0, h/2); ctx.lineTo(w, h/2); ctx.moveTo(0, h/4); ctx.lineTo(w, h/4); ctx.moveTo(0, 3*h/4); ctx.lineTo(w, 3*h/4); ctx.stroke();
  if (!samples || !samples.length) return;
  const spp = Math.max(1, Math.floor(samples.length / w));
  ctx.strokeStyle = '#0071e3'; ctx.lineWidth = 1.5;
  ctx.beginPath();
  for (let x = 0; x < w; x++) {
    const si = Math.floor(x * samples.length / w);
    let mn = 1, mx = -1;
    for (let j = 0; j < spp && si + j < samples.length; j++) { const v = samples[si + j]; if (v < mn) mn = v; if (v > mx) mx = v; }
    const y1 = (1 - mx) * h / 2, y2 = (1 - mn) * h / 2;
    if (x === 0) ctx.moveTo(x, (y1 + y2) / 2); else { ctx.lineTo(x, y1); ctx.lineTo(x, y2); }
  }
  ctx.stroke();
  const zl = Math.min(samples.length, 2000);
  ctx.strokeStyle = 'rgba(112,72,232,0.35)'; ctx.lineWidth = 1;
  ctx.beginPath();
  for (let x = 0; x < w; x++) { const v = samples[Math.floor(x * zl / w)]; const y = (1 - v) * h / 2; x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y); }
  ctx.stroke();
}

// ── FL Studio QWERTY keyboard ──
// Bottom row: Z..M = C3..B3,  Top row: Q..I = C4..C5
const FL_KEYS = {
  'z':48,'s':49,'x':50,'d':51,'c':52,'v':53,'g':54,'b':55,'h':56,'n':57,'j':58,'m':59,
  'q':60,'2':61,'w':62,'3':63,'e':64,'r':65,'5':66,'t':67,'6':68,'y':69,'7':70,'u':71,'i':72
};
const heldKeys = new Set();

document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
  if (e.key === ' ') { e.preventDefault(); playNote(60); return; }
  const midi = FL_KEYS[e.key];
  if (midi !== undefined && !heldKeys.has(e.key)) {
    heldKeys.add(e.key);
    playNote(midi);
    const el = document.querySelector(`.key-w[data-midi="${midi}"],.key-b[data-midi="${midi}"]`);
    if (el) { document.querySelectorAll('.key-w.active,.key-b.active').forEach(k => k.classList.remove('active')); el.classList.add('active'); }
  }
});
document.addEventListener('keyup', e => {
  heldKeys.delete(e.key);
  const midi = FL_KEYS[e.key];
  if (midi !== undefined) {
    const el = document.querySelector(`.key-w[data-midi="${midi}"],.key-b[data-midi="${midi}"]`);
    if (el) el.classList.remove('active');
  }
});

// ── Init ──
initUI();
activeIdx = 0;
document.querySelectorAll('.preset-item').forEach((el, i) => el.classList.toggle('active', i === 0));
refreshUI();
